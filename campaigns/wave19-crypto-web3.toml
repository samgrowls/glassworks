# Wave 19: Crypto/Web3 Packages Hunt (300 packages)
#
# Purpose: Hunt for GlassWorm in Crypto/Web3 ecosystem
# Target: 300 crypto/web3 packages (wallets, DeFi, NFT, exchanges)
# Rationale: Blockchain C2 is GlassWorm signature - crypto packages high risk
#
# Run with: glassware campaign run campaigns/wave19-crypto-web3.toml
# Expected duration: ~15-20 minutes

[campaign]
name = "Wave 19 - Crypto/Web3 Hunt (300 packages)"
description = "Hunt for GlassWorm in Crypto/Web3 ecosystem"
created_by = "security-team"
priority = "high"
tags = ["hunt", "wave19", "crypto", "web3", "high-risk"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
cache_enabled = true
cache_ttl_days = 7

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 4.0

[settings.scoring.tier_config]
mode = "tiered"

[[settings.scoring.tiers]]
tier = 1
detectors = ["invisible_char", "glassware_pattern", "obfuscation"]
threshold = 0.0
weight_multiplier = 1.0

[[settings.scoring.tiers]]
tier = 2
detectors = ["header_c2", "exfil_schema", "blockchain_c2"]
threshold = 2.0
weight_multiplier = 0.8

[[settings.scoring.tiers]]
tier = 3
detectors = ["locale_geofencing", "time_delay_sandbox_evasion"]
threshold = 10.0
weight_multiplier = 0.8

[[settings.scoring.conditional_rules]]
name = "glassworm_signature"
condition = "invisible_char.count >= 10 AND blockchain_c2.count >= 1"
action = "final_score = 25.0"

[settings.scoring.weights]
invisible_char = 6.0
glassware_pattern = 10.0
obfuscation = 10.0
blockchain_c2 = 5.0
header_c2 = 4.0
exfil_schema = 6.0
locale_geofencing = 7.0
time_delay_sandbox_evasion = 7.0

[settings.llm]
tier1_enabled = false
tier2_enabled = false

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave19"
report_dir = "reports/wave19"

# ============================================================
# Wave 19A: Evidence Validation
# ============================================================
[[waves]]
id = "wave_19a"
name = "Evidence Validation"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = ["iflow-mcp-watercrawl-watercrawl-mcp@1.3.4"]

[waves.expectations]
must_flag_all = true
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = false

# ============================================================
# Wave 19B: Ethereum Wallets (100 packages)
# ============================================================
[[waves]]
id = "wave_19b"
name = "Ethereum Wallets"
depends_on = ["wave_19a"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["ethereum-wallet", "eth-wallet", "web3-wallet", "metamask", "wallet-connect"]
samples_per_keyword = 20
max_downloads = 500000

[waves.expectations]
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = true

# ============================================================
# Wave 19C: DeFi/DEX (100 packages)
# ============================================================
[[waves]]
id = "wave_19c"
name = "DeFi/DEX"
depends_on = ["wave_19b"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["defi", "dex", "uniswap", "sushiswap", "pancakeswap", "yield-farm"]
samples_per_keyword = 17
max_downloads = 500000

[waves.expectations]
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = true

# ============================================================
# Wave 19D: NFT/Marketplace (100 packages)
# ============================================================
[[waves]]
id = "wave_19d"
name = "NFT/Marketplace"
depends_on = ["wave_19c"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["nft", "opensea", "nft-marketplace", "erc721", "erc1155"]
samples_per_keyword = 20
max_downloads = 500000

[waves.expectations]
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = true
