# Phase A: Controlled Campaign - Pre-Production Validation
#
# Purpose: Validate detection on known-clean packages with manual review
# Expected: ≤5% false positive rate on 200 curated high-popularity packages
# Duration: 3 days
#
# Run with: glassware campaign run campaigns/phase-a-controlled/config.toml --llm
# Expected duration: ~2-3 minutes (0.5s/package including download)

[campaign]
name = "pre-production-validation"
description = "Pre-production validation on known-clean packages"
created_by = "security-team"
priority = "high"
tags = ["phase-a", "controlled", "pre-production", "validation"]

[settings]
concurrency = 4
rate_limit_npm = 10.0
rate_limit_github = 5.0
cache_enabled = true
cache_ttl_days = 7
timeout_seconds = 300

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 3.5

[settings.llm]
tier1_enabled = true
tier1_provider = "cerebras"
tier1_threshold = 6.0  # Skip Tier 1 for score < 6.0 (reduces API calls, avoids rate limiting)
tier2_enabled = true
tier2_threshold = 7.0  # Tier 2 deep analysis for score >= 7.0

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/phase-a-controlled"
report_dir = "reports/phase-a-controlled"

# ============================================================
