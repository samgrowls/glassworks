# Wave 10: Production-Scale Hunt (1000+ packages)
#
# Purpose: Production-scale detection across multiple ecosystems
# Target: 1000+ packages for real-world GlassWare detection
#
# Run with: glassware campaign run campaigns/wave10-1000plus.toml --llm --deep-llm
# Expected duration: ~5-6 minutes (0.32s/package including download)

[campaign]
name = "Wave 10 - Production-Scale Hunt (1000+ packages)"
description = "Production-scale scan across React Native, Vue, Angular, Node.js ecosystems"
created_by = "security-team"
priority = "high"
tags = ["hunt", "real-world", "wave10", "production-scale", "1000plus"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
rate_limit_github = 5.0
cache_enabled = true
cache_ttl_days = 7

[settings.whitelist]
# i18n libraries (naturally contain Unicode)
packages = [
    "moment", "moment-timezone",
    "date-fns", "dayjs",
    "i18next", "react-intl", "intl",
    "lodash", "underscore",
    "express", "globalize",
    "prettier", "typescript", "eslint",
    "@babel/core", "@babel/*",
    "validator", "validate",
]

# Crypto libraries (legitimate API usage)
crypto_packages = [
    "ethers", "web3", "viem", "wagmi",
    "@solana/web3.js", "bitcoinjs-lib",
    "hdkey", "@metamask/*",
    "node-forge", "crypto-js",
    "crypto", "bcrypt", "bcryptjs",
    "argon2", "pbkdf2", "scrypt",
    "firebase", "firebase-admin",
    "twilio", "vonage",
]

# Build tools (complex patterns are legitimate)
build_tools = [
    "webpack", "webpack-",
    "vite", "rollup", "esbuild",
    "parcel", "gulp", "grunt",
    "core-js", "babel",
    "postcss", "autoprefixer",
    "metro", "metro-",
    "prisma", "@prisma/*",
]

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 4.0

[settings.llm]
tier1_enabled = true
tier1_provider = "cerebras"
tier2_enabled = true
tier2_threshold = 7.0

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave10"
report_dir = "reports/wave10"

