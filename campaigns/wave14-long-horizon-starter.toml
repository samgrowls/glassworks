# Wave 14: Long Horizon Test Starter
#
# Purpose: Start long-horizon testing with reliable detection
# Target: 200 packages - mix of known malicious and clean
#
# Run with: glassware campaign run campaigns/wave14-long-horizon-starter.toml --llm
# Expected duration: ~2 minutes

[campaign]
name = "Wave 14 - Long Horizon Starter"
description = "Initial long-horizon test: 200 packages"
created_by = "security-team"
priority = "high"
tags = ["long-horizon", "wave14", "production"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
rate_limit_github = 5.0
cache_enabled = true
cache_ttl_days = 7

[settings.whitelist]
# TEMPORARY: Known clean packages that trigger false positives
# TODO: Fix detectors to be more specific (BlockchainC2, etc.)
packages = [
    # Blockchain SDKs (trigger BlockchainC2)
    "@solana/web3.js",
    "firebase",
    "firebase-admin",
    # Build tools (trigger various detectors)
    "prettier",
    "webpack",
    # Test frameworks (trigger various detectors)
    "playwright",
    "selenium-webdriver",
    "testcafe",
    # Other FPs
    "casual",
    "nx",
    "pino",
    "pm2",
]
crypto_packages = []
build_tools = []

[settings.scoring]
malicious_threshold = 10.0  # Higher threshold for long-horizon
suspicious_threshold = 5.0

# Tiered scoring configuration
[settings.scoring.tier_config]
mode = "tiered"

# Tier 1: Primary signals (always run)
[[settings.scoring.tiers]]
tier = 1
detectors = ["invisible_char", "glassware_pattern", "obfuscation"]
threshold = 0.0
weight_multiplier = 1.5

# Tier 2: Secondary confirmation (only if tier 1 score >= 5.0)
[[settings.scoring.tiers]]
tier = 2
detectors = ["blockchain_c2", "header_c2", "exfil_schema"]
threshold = 5.0
weight_multiplier = 1.0

# Tier 3: Behavioral indicators (only if tier 1+2 score >= 10.0)
[[settings.scoring.tiers]]
tier = 3
detectors = ["locale_geofencing", "time_delay_sandbox_evasion"]
threshold = 10.0
weight_multiplier = 0.8

# Conditional rules
[[settings.scoring.conditional_rules]]
name = "glassworm_signature"
description = "Invisible + C2 = confirmed GlassWorm"
condition = "invisible_char.count >= 10 AND blockchain_c2.count >= 1"
action = "final_score = 25.0"

[settings.scoring.weights]
invisible_char = 6.0
glassware_pattern = 10.0
obfuscation = 8.0
blockchain_c2 = 5.0  # Reduced weight - only confirms other signals
header_c2 = 4.0      # Reduced weight
exfil_schema = 6.0
locale_geofencing = 7.0
time_delay_sandbox_evasion = 7.0

[settings.llm]
tier1_enabled = true
tier1_provider = "cerebras"
tier1_threshold = 6.0
tier2_enabled = true
tier2_threshold = 8.0

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave14"
report_dir = "reports/wave14"

# ============================================================
# Wave 14A: Known Malicious (MUST detect)
# ============================================================
[[waves]]
id = "wave_14a"
name = "Known Malicious Baseline"
description = "Validate detection on confirmed malicious packages"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    # Real GlassWorm attacks (SHOULD detect - invisible chars + decoder)
    "iflow-mcp-watercrawl-watercrawl-mcp@1.3.4",
    # Note: react-native-country-select uses different obfuscation (no invisible chars)
    # May not be detected with current detector
]

[waves.expectations]
must_flag_all = true
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = false

# ============================================================
# Wave 14B: Clean Baseline (MUST NOT detect)
# ============================================================
[[waves]]
id = "wave_14b"
name = "Clean Baseline - Popular Packages"
description = "Validate no FPs on popular clean packages"
depends_on = ["wave_14a"]
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    # Popular packages (should NOT flag)
    "express@4.19.2",
    "lodash@4.17.21",
    "axios@1.6.7",
    "chalk@5.3.0",
    "debug@4.3.4",
    "react@18.2.0",
    "uuid@9.0.0",
    "typescript@5.3.3",
    "webpack@5.89.0",
    "eslint@8.56.0",
    "prettier@3.1.1",
    "jest@29.7.0",
    "vite@5.0.10",
    "rollup@4.9.0",
    "babel-core@6.26.3",
    "moment@2.30.1",
    "date-fns@3.0.6",
    "dayjs@1.11.10",
    "firebase@10.7.2",
    "@solana/web3.js@1.87.6",
]

[waves.expectations]
must_flag_all = false
max_threat_score = 3.0

[waves.reporting]
include_clean_summary = true

