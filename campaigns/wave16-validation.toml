# Wave 16: Production Validation (500+ packages)
#
# Purpose: Validate FP rate after Tier 1 signal requirement
# Target: 500+ clean popular packages
#
# Run with: glassware campaign run campaigns/wave16-validation.toml
# Expected duration: ~15-20 minutes

[campaign]
name = "Wave 16 - Production Validation (500+ packages)"
description = "Validate FP rate after Tier 1 signal requirement fix"
created_by = "security-team"
priority = "critical"
tags = ["validation", "wave16", "production", "fp-rate"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
rate_limit_github = 5.0
cache_enabled = true
cache_ttl_days = 7

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 4.0

# Tiered scoring configuration
[settings.scoring.tier_config]
mode = "tiered"

# Tier 1: Primary signals (always runs) - REQUIRED for high scores
[[settings.scoring.tiers]]
tier = 1
detectors = ["invisible_char", "glassware_pattern", "obfuscation"]
threshold = 0.0
weight_multiplier = 1.0

# Tier 2: Secondary confirmation (only if tier 1 score >= 2.0)
[[settings.scoring.tiers]]
tier = 2
detectors = ["header_c2", "exfil_schema", "blockchain_c2"]
threshold = 2.0
weight_multiplier = 0.8

# Tier 3: Behavioral indicators (only if tier 1+2 score >= 10.0)
[[settings.scoring.tiers]]
tier = 3
detectors = ["locale_geofencing", "time_delay_sandbox_evasion"]
threshold = 10.0
weight_multiplier = 0.8

# Conditional rules for high-confidence patterns
[[settings.scoring.conditional_rules]]
name = "glassworm_signature"
description = "Invisible + C2 = confirmed GlassWorm"
condition = "invisible_char.count >= 10 AND blockchain_c2.count >= 1"
action = "final_score = 25.0"

[settings.scoring.weights]
invisible_char = 6.0
glassware_pattern = 10.0
obfuscation = 10.0
blockchain_c2 = 5.0
header_c2 = 4.0
exfil_schema = 6.0
locale_geofencing = 7.0
time_delay_sandbox_evasion = 7.0

[settings.llm]
tier1_enabled = false  # DISABLED - not needed for FP testing
tier2_enabled = false

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave16"
report_dir = "reports/wave16"

# ============================================================
# Wave 16A: Evidence Validation (MUST detect 100%)
# ============================================================
[[waves]]
id = "wave_16a"
name = "Evidence Validation"
description = "Validate 100% detection on curated GlassWorm evidence"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    # Real GlassWorm attack (invisible chars + C2 + obfuscation)
    "iflow-mcp-watercrawl-watercrawl-mcp@1.3.4",
]

[waves.expectations]
must_flag_all = true
min_threat_score = 7.0
min_malicious_count = 1

[waves.reporting]
include_clean_summary = false

# ============================================================
# Wave 16B: Clean Baseline (500+ packages, MUST NOT flag)
# ============================================================
[[waves]]
id = "wave_16b"
name = "Clean Baseline - 500+ Packages"
description = "Measure FP rate on 500+ popular clean packages"
depends_on = ["wave_16a"]
mode = "validate"

