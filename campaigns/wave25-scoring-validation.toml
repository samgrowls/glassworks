# Wave25 - Scoring Fix Validation
# Purpose: Test that obfuscation-only packages no longer score >=7.0
# Expected: Bundled/minified packages should score 4.0-6.0 (below malicious threshold)

[campaign]
name = "Wave25 - Scoring Fix Validation"
description = "Validate that obfuscation-only packages don't trigger false positives"
created_by = "security-team"
priority = "critical"
tags = ["validation", "scoring-fix"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
cache_enabled = true
cache_ttl_days = 7

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 4.0

[settings.scoring.tier_config]
mode = "tiered"

# Tier 1: Primary signals (REQUIRED for high scores)
[[settings.scoring.tier_config.tiers]]
tier = 1
detectors = ["invisible_char", "glassware_pattern"]
threshold = 0.0
weight_multiplier = 1.0

# Tier 2: Secondary confirmation (requires Tier 1 signal)
[[settings.scoring.tier_config.tiers]]
tier = 2
detectors = ["header_c2", "exfil_schema", "blockchain_c2", "obfuscation"]
threshold = 2.0
weight_multiplier = 0.8

# Tier 3: Behavioral indicators
[[settings.scoring.tier_config.tiers]]
tier = 3
detectors = ["locale_geofencing", "time_delay_sandbox_evasion"]
threshold = 10.0
weight_multiplier = 0.8

[settings.scoring.weights]
invisible_char = 6.0
glassware_pattern = 10.0
obfuscation = 10.0
blockchain_c2 = 5.0
header_c2 = 4.0
exfil_schema = 6.0
locale_geofencing = 7.0
time_delay_sandbox_evasion = 7.0

[settings.llm]
tier1_enabled = false
tier2_enabled = false

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave25"
report_dir = "reports/wave25"

# ============================================================
# Wave 25A: Evidence Validation
# ============================================================
[[waves]]
id = "wave_25a"
name = "Evidence Validation"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    "iflow-mcp-watercrawl-watercrawl-mcp@1.3.4",
]

[waves.expectations]
must_flag_all = true
min_threat_score = 7.0

# ============================================================
# Wave 25B: Known Bundled Packages (Should NOT flag)
# ============================================================
[[waves]]
id = "wave_25b"
name = "Bundled Packages Test"
depends_on = ["wave_25a"]
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    # These should score <7.0 with the fix
    "systemjs-plugin-babel@0.0.25",  # Previously scored 10.00 (bundled code)
    "babel-plugin-angularjs-annotate@0.10.0",  # Previously scored 9.00 (Babel patterns)
]

[waves.expectations]
max_threat_score = 7.0  # Should NOT exceed threshold

# ============================================================
# Wave 25C: High-Risk Categories (100 packages)
# ============================================================
[[waves]]
id = "wave_25c"
name = "High-Risk Validation"
depends_on = ["wave_25b"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["webpack"]
samples_per_keyword = 50
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["babel"]
samples_per_keyword = 50
max_downloads = 500000

[waves.expectations]
max_malicious_count = 5
