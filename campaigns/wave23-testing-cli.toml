# Wave 23: Testing Frameworks & CLI Tools (2000 packages)
# Purpose: Hunt for GlassWorm in testing frameworks and CLI tools
# Rationale: High developer trust, often excluded from security scans
# Expected Duration: ~2-3 hours

[campaign]
name = "Wave 23 - Testing & CLI Tools Hunt"
description = "Hunt for GlassWorm in testing frameworks and CLI tools (2000 packages)"
created_by = "security-team"
priority = "high"
tags = ["hunt", "wave23", "testing", "cli", "high-risk"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
cache_enabled = true
cache_ttl_days = 7

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 4.0
tier_config = { mode = "tiered" }

[[settings.scoring.tiers]]
tier = 1
detectors = ["invisible_char", "glassware_pattern"]
threshold = 0.0
weight_multiplier = 1.0

[[settings.scoring.tiers]]
tier = 2
detectors = ["header_c2", "exfil_schema", "blockchain_c2", "obfuscation"]
threshold = 2.0
weight_multiplier = 0.8

[[settings.scoring.tiers]]
tier = 3
detectors = ["locale_geofencing", "time_delay_sandbox_evasion"]
threshold = 10.0
weight_multiplier = 0.8

[settings.scoring.weights]
invisible_char = 6.0
glassware_pattern = 10.0
obfuscation = 10.0
blockchain_c2 = 5.0
header_c2 = 4.0
exfil_schema = 6.0
locale_geofencing = 7.0
time_delay_sandbox_evasion = 7.0

[settings.llm]
tier1_enabled = false
tier2_enabled = false

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave23"
report_dir = "reports/wave23"

# ============================================================
# Wave 23A: Evidence Validation
# ============================================================
[[waves]]
id = "wave_23a"
name = "Evidence Validation"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = ["iflow-mcp-watercrawl-watercrawl-mcp@1.3.4"]

[waves.expectations]
must_flag_all = true
min_threat_score = 7.0
min_malicious_count = 1

# ============================================================
# Wave 23B: Testing Frameworks (1000 packages)
# ============================================================
[[waves]]
id = "wave_23b"
name = "Testing Frameworks"
depends_on = ["wave_23a"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["mocha"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["chai"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["sinon"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["cypress"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["playwright"]
samples_per_keyword = 200
max_downloads = 500000

[waves.expectations]
must_flag_all = false
max_threat_score = 7.0
max_malicious_count = 10

# ============================================================
# Wave 23C: CLI Tools (1000 packages)
# ============================================================
[[waves]]
id = "wave_23c"
name = "CLI Tools"
depends_on = ["wave_23b"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["commander"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["yargs"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["chalk"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["ora"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["inquirer"]
samples_per_keyword = 200
max_downloads = 500000

[waves.expectations]
must_flag_all = false
max_threat_score = 7.0
max_malicious_count = 10
