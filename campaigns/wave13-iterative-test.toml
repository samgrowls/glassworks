# Wave 13: Iterative Testing Campaign
#
# Purpose: Systematic iterative testing for long-horizon scanning
# Target: Start small (50 pkg), scale to medium (500 pkg), then large (2000+ pkg)
#
# Run with: glassware campaign run campaigns/wave13-iterative-test.toml --llm
# Expected duration: ~30 seconds for wave A, ~3 min for wave B, ~10 min for wave C

[campaign]
name = "Wave 13 - Iterative Testing"
description = "Systematic testing: evidence validation → small wave → medium wave → large wave"
created_by = "security-team"
priority = "critical"
tags = ["iterative", "validation", "wave13", "long-horizon"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
rate_limit_github = 5.0
cache_enabled = true
cache_ttl_days = 7

[settings.whitelist]
# Minimal whitelist - only core infrastructure packages
# Detectors now use context-aware logic to prevent FPs
packages = []
crypto_packages = []
build_tools = []

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 4.0

[settings.llm]
tier1_enabled = true
tier1_provider = "cerebras"
tier1_threshold = 6.0
tier2_enabled = true
tier2_threshold = 8.0

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave13"
report_dir = "reports/wave13"

# ============================================================
# Wave 13A: Evidence Tarball Validation (MUST detect)
# ============================================================
[[waves]]
id = "wave_13a"
name = "Evidence Tarball Validation"
description = "Validate detection on known malicious evidence tarballs"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    # Real GlassWorm attacks (should detect)
    "react-native-country-select@0.3.91",
    "iflow-mcp-watercrawl-watercrawl-mcp@1.3.4",
    # Clean baseline (should NOT detect)
    "express@4.19.2",
    "lodash@4.17.21",
    "axios@1.6.7",
]

[waves.expectations]
must_flag_all = false  # Only malicious ones should flag
min_malicious_count = 2

[waves.reporting]
include_clean_summary = true

