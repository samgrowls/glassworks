# Wave 11: Evidence Validation Scan (50 packages)
#
# Purpose: Validate evidence detection is working correctly
# Target: Mix of known malicious + known clean packages
#
# Run with: glassware campaign run campaigns/wave11-evidence-validation.toml --llm --deep-llm
# Expected duration: ~15 seconds

[campaign]
name = "Wave 11 - Evidence Validation (50 packages)"
description = "Validate evidence detection with known malicious and clean packages"
created_by = "security-team"
priority = "critical"
tags = ["validation", "evidence", "wave11", "critical-fix-validation"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
rate_limit_github = 5.0
cache_enabled = true
cache_ttl_days = 7

[settings.whitelist]
# i18n libraries (naturally contain Unicode)
packages = [
    "moment", "moment-timezone",
    "date-fns", "dayjs",
    "i18next", "react-intl", "intl",
    "lodash", "underscore",
    "express", "globalize",
    "prettier", "typescript", "eslint",
    "@babel/core", "@babel/*",
    "validator", "validate",
    "dotenv",
]

# Crypto libraries (legitimate API usage)
crypto_packages = [
    "ethers", "web3", "viem", "wagmi",
    "@solana/web3.js", "bitcoinjs-lib",
    "hdkey", "@metamask/*",
    "node-forge", "crypto-js",
    "crypto", "bcrypt", "bcryptjs",
    "argon2", "pbkdf2", "scrypt",
    "firebase", "firebase-admin",
    "twilio", "vonage",
]

# Build tools (complex patterns are legitimate)
build_tools = [
    "webpack", "webpack-",
    "vite", "rollup", "esbuild",
    "parcel", "gulp", "grunt",
    "core-js", "babel",
    "postcss", "autoprefixer",
    "metro", "metro-",
    "prisma", "@prisma/*",
]

[settings.scoring]
malicious_threshold = 5.0
suspicious_threshold = 2.0

[settings.llm]
tier1_enabled = true
tier1_provider = "cerebras"
tier2_enabled = true
tier2_threshold = 7.0

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave11"
report_dir = "reports/wave11"

# ============================================================
# Wave 11A: Known Malicious (MUST be flagged)
# ============================================================
[[waves]]
id = "wave_11a"
name = "Known Malicious - Evidence Packages"
description = "These MUST be flagged as malicious"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    # Koi Security confirmed GlassWare attacks
    "react-native-country-select@0.3.1",
    "react-native-international-phone-number@0.10.7",
]

[waves.expectations]
must_flag_all = true
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = false

# ============================================================
# Wave 11B: Known Clean (MUST NOT be flagged)
# ============================================================
[[waves]]
id = "wave_11b"
name = "Known Clean - Popular Libraries"
description = "These MUST NOT be flagged"
depends_on = ["wave_11a"]
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    # Top npm packages (all should be clean)
