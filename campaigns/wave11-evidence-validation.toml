    "webpack@5.89.0",
    "vite@5.0.10",
    "rollup@4.9.2",
    "typescript@5.3.3",
    "eslint@8.56.0",
    "prettier@3.1.1",
    "jest@29.7.0",
    "mocha@10.2.0",
    "chai@4.3.10",
    "sinon@17.0.1",
