# Wave 24: Web Frameworks & State Management (2000 packages)
# Purpose: Hunt for GlassWorm in web frameworks and state management libraries
# Rationale: Core dependencies with massive downstream impact
# Expected Duration: ~2-3 hours

[campaign]
name = "Wave 24 - Web Frameworks & State Management"
description = "Hunt for GlassWorm in web frameworks and state management (2000 packages)"
created_by = "security-team"
priority = "high"
tags = ["hunt", "wave24", "frameworks", "state-management", "high-risk"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
cache_enabled = true
cache_ttl_days = 7

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 4.0
tier_config = { mode = "tiered" }

[[settings.scoring.tiers]]
tier = 1
detectors = ["invisible_char", "glassware_pattern"]
threshold = 0.0
weight_multiplier = 1.0

[[settings.scoring.tiers]]
tier = 2
detectors = ["header_c2", "exfil_schema", "blockchain_c2", "obfuscation"]
threshold = 2.0
weight_multiplier = 0.8

[[settings.scoring.tiers]]
tier = 3
detectors = ["locale_geofencing", "time_delay_sandbox_evasion"]
threshold = 10.0
weight_multiplier = 0.8

[settings.scoring.weights]
invisible_char = 6.0
glassware_pattern = 10.0
obfuscation = 10.0
blockchain_c2 = 5.0
header_c2 = 4.0
exfil_schema = 6.0
locale_geofencing = 7.0
time_delay_sandbox_evasion = 7.0

[settings.llm]
tier1_enabled = false
tier2_enabled = false

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave24"
report_dir = "reports/wave24"

# ============================================================
# Wave 24A: Evidence Validation
# ============================================================
[[waves]]
id = "wave_24a"
name = "Evidence Validation"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = ["iflow-mcp-watercrawl-watercrawl-mcp@1.3.4"]

[waves.expectations]
must_flag_all = true
min_threat_score = 7.0
min_malicious_count = 1

# ============================================================
# Wave 24B: Web Frameworks (1000 packages)
# ============================================================
[[waves]]
id = "wave_24b"
name = "Web Frameworks"
depends_on = ["wave_24a"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["react"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["vue"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["angular"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["svelte"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["next"]
samples_per_keyword = 200
max_downloads = 500000

[waves.expectations]
must_flag_all = false
max_threat_score = 7.0
max_malicious_count = 10

# ============================================================
# Wave 24C: State Management (1000 packages)
# ============================================================
[[waves]]
id = "wave_24c"
name = "State Management"
depends_on = ["wave_24b"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["redux"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["mobx"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["zustand"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["recoil"]
samples_per_keyword = 200
max_downloads = 500000

[[waves.sources]]
type = "npm_search"
keywords = ["jotai"]
samples_per_keyword = 200
max_downloads = 500000

[waves.expectations]
must_flag_all = false
max_threat_score = 7.0
max_malicious_count = 10
