# Wave 18: React Native Packages Hunt (300 packages)
#
# Purpose: Hunt for GlassWorm in React Native ecosystem
# Target: 300 React Native packages (phone, SMS, auth, country selectors)
# Rationale: Original GlassWorm found in react-native-country-select
#
# Run with: glassware campaign run campaigns/wave18-react-native.toml
# Expected duration: ~15-20 minutes

[campaign]
name = "Wave 18 - React Native Hunt (300 packages)"
description = "Hunt for GlassWorm in React Native ecosystem"
created_by = "security-team"
priority = "high"
tags = ["hunt", "wave18", "react-native", "high-risk"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
cache_enabled = true
cache_ttl_days = 7

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 4.0

# Tiered scoring
[settings.scoring.tier_config]
mode = "tiered"

[[settings.scoring.tiers]]
tier = 1
detectors = ["invisible_char", "glassware_pattern", "obfuscation"]
threshold = 0.0
weight_multiplier = 1.0

[[settings.scoring.tiers]]
tier = 2
detectors = ["header_c2", "exfil_schema", "blockchain_c2"]
threshold = 2.0
weight_multiplier = 0.8

[[settings.scoring.tiers]]
tier = 3
detectors = ["locale_geofencing", "time_delay_sandbox_evasion"]
threshold = 10.0
weight_multiplier = 0.8

[[settings.scoring.conditional_rules]]
name = "glassworm_signature"
condition = "invisible_char.count >= 10 AND blockchain_c2.count >= 1"
action = "final_score = 25.0"

[settings.scoring.weights]
invisible_char = 6.0
glassware_pattern = 10.0
obfuscation = 10.0
blockchain_c2 = 5.0
header_c2 = 4.0
exfil_schema = 6.0
locale_geofencing = 7.0
time_delay_sandbox_evasion = 7.0

[settings.llm]
tier1_enabled = false
tier2_enabled = false

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave18"
report_dir = "reports/wave18"

# ============================================================
# Wave 18A: Evidence Validation
# ============================================================
[[waves]]
id = "wave_18a"
name = "Evidence Validation"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = ["iflow-mcp-watercrawl-watercrawl-mcp@1.3.4"]

[waves.expectations]
must_flag_all = true
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = false

# ============================================================
# Wave 18B: React Native Phone/SMS (100 packages)
# ============================================================
[[waves]]
id = "wave_18b"
name = "React Native Phone/SMS"
depends_on = ["wave_18a"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["react-native-phone", "react-native-sms", "react-native-call", "phone-input", "otp-input"]
samples_per_keyword = 20
max_downloads = 500000

[waves.expectations]
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = true

# ============================================================
# Wave 18C: React Native Country/Flag (100 packages)
# ============================================================
[[waves]]
id = "wave_18c"
name = "React Native Country/Flag"
depends_on = ["wave_18b"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["react-native-country", "react-native-flag", "country-picker", "country-select"]
samples_per_keyword = 25
max_downloads = 500000

[waves.expectations]
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = true

# ============================================================
# Wave 18D: React Native Auth/Biometric (100 packages)
# ============================================================
[[waves]]
id = "wave_18d"
name = "React Native Auth/Biometric"
depends_on = ["wave_18c"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["react-native-auth", "react-native-biometric", "react-native-fingerprint", "react-native-face"]
samples_per_keyword = 25
max_downloads = 500000

[waves.expectations]
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = true
