# Wave 12: Large-Scale Scan (5000 packages)
#
# Purpose: Production-scale detection across high-risk categories
# Target: 5000 packages from high-risk ecosystems
#
# Run with: glassware campaign run campaigns/wave12-5000pkg.toml --llm --deep-llm
# Expected duration: ~25-30 minutes

[campaign]
name = "Wave 12 - Large-Scale Scan (5000 packages)"
description = "Production-scale scan across high-risk package categories"
created_by = "security-team"
priority = "high"
tags = ["hunt", "real-world", "wave12", "large-scale", "5000pkg"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
rate_limit_github = 5.0
cache_enabled = true
cache_ttl_days = 7

[settings.whitelist]
# ⚠️ UPDATED 2026-03-24: Package-level whitelisting DISABLED in scanner
# These entries are kept for documentation/backward compatibility only
# All packages now go through the same detection logic
# Context-aware detection in individual detectors prevents FPs

# i18n libraries (naturally contain Unicode) - KEPT for reference
packages = [
    "moment", "moment-timezone",
    "date-fns", "dayjs",
    "i18next", "react-intl", "intl",
    "globalize",
]

# Crypto libraries (legitimate blockchain API usage) - MINIMAL LIST
# Only core crypto/web3 libraries kept
crypto_packages = [
    "ethers", "web3", "viem", "wagmi",
    "@solana/web3.js", "bitcoinjs-lib",
    "hdkey", "@metamask/*",
]

# Build tools - REMOVED ALL (detectors use context-aware logic now)
build_tools = [
]

[settings.scoring]
malicious_threshold = 5.0
suspicious_threshold = 2.0

[settings.llm]
tier1_enabled = true
tier1_provider = "cerebras"
tier1_threshold = 6.0  # Skip Tier 1 for score < 6.0 (reduces API calls)
tier2_enabled = true
tier2_threshold = 7.0

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave12"
report_dir = "reports/wave12"

# ============================================================
# Wave 12A: React Native Ecosystem (1000 packages)
# ============================================================
[[waves]]
id = "wave_12a"
name = "React Native Ecosystem"
description = "Scan 1000 React Native packages"
depends_on = []
mode = "hunt"

[[waves.sources]]
type = "npm_category"
category = "react-native"
samples = 1000

[waves.expectations]
min_threat_score = 5.0

[waves.reporting]
include_clean_summary = false

