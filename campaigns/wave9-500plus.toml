# Wave 9: Large-Scale Real-World Hunt (500+ packages)
#
# Purpose: Scale up to 500+ packages across multiple ecosystems
# Target: Real-world GlassWare detection at scale
#
# Run with: glassware campaign run campaigns/wave9-500plus.toml --llm --deep-llm
# Expected duration: ~90 seconds (0.18s/package)

[campaign]
name = "Wave 9 - Large-Scale Hunt (500+ packages)"
description = "Scale up to 500+ packages across React Native, Vue, Angular ecosystems"
created_by = "security-team"
priority = "high"
tags = ["hunt", "real-world", "wave9", "large-scale", "production"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
rate_limit_github = 5.0
cache_enabled = true
cache_ttl_days = 7

[settings.whitelist]
# i18n libraries (naturally contain Unicode)
packages = [
    "moment", "moment-timezone",
    "date-fns", "dayjs",
    "i18next", "react-intl", "intl",
    "lodash", "underscore",
    "express", "globalize",
    "prettier", "typescript", "eslint",
    "@babel/core", "@babel/*",
    "react-native-country-select",
    "react-native-international-phone-number",
]

# Crypto libraries (legitimate API usage)
crypto_packages = [
    "ethers", "web3", "viem", "wagmi",
    "@solana/web3.js", "bitcoinjs-lib",
    "hdkey", "@metamask/*",
    "node-forge", "crypto-js",
    "crypto", "bcrypt", "bcryptjs",
    "argon2", "pbkdf2", "scrypt",
    "firebase", "firebase-admin",
]

# Build tools (complex patterns are legitimate)
build_tools = [
    "webpack", "webpack-",
    "vite", "rollup", "esbuild",
    "parcel", "gulp", "grunt",
    "core-js", "babel",
    "postcss", "autoprefixer",
]

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 4.0

[settings.llm]
tier1_enabled = true  # Tier 1 LLM (Cerebras) for fast triage
tier1_provider = "cerebras"
tier2_enabled = true  # Tier 2 LLM (NVIDIA) for flagged packages
tier2_threshold = 7.0

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave9"
report_dir = "reports/wave9"

# ============================================================
# Wave 9A: Known Malicious Baseline (Validation)
# ============================================================
[[waves]]
id = "wave_9a"
name = "Known Malicious Baseline"
description = "Validate detection with confirmed malicious packages"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    "react-native-country-select@0.3.1",
    "react-native-international-phone-number@0.10.7",
    "react-native-phone-input@1.3.7",
    "react-native-otp-inputs@0.3.1",
]

[waves.expectations]
must_flag_all = false  # These are whitelisted now
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = false

