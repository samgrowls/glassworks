# ============================================================
# Wave 15C: High-Risk Categories (Hunt Mode)
# ============================================================
[[waves]]
id = "wave_15c"
name = "High-Risk Categories Hunt"
description = "Scan high-risk categories for potential GlassWorm attacks"
depends_on = ["wave_15b"]
mode = "hunt"

[[waves.sources]]
type = "npm_search"
keywords = ["react-native", "phone", "sms", "country", "flag"]
samples_per_keyword = 50
max_downloads = 100000

[[waves.sources]]
type = "npm_search"
keywords = ["crypto", "wallet", "blockchain", "web3", "defi"]
samples_per_keyword = 50
max_downloads = 100000

[[waves.sources]]
type = "npm_search"
keywords = ["i18n", "translation", "locale", "language", "intl"]
samples_per_keyword = 50
max_downloads = 100000

[waves.expectations]
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = false
