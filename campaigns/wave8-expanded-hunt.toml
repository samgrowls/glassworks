# Wave 8: Expanded Real-World Hunt (100+ packages)
#
# Purpose: Scale up detection to 100+ packages across high-risk categories
# Target: Real-world GlassWare steganographic attacks in production npm packages
#
# Run with: glassware campaign run campaigns/wave8-expanded-hunt.toml --llm --deep-llm
#
# Campaign Ramp-up Plan:
# - Wave 6: 11 packages (calibration) ✅
# - Wave 7: 24 packages (real-world hunt) ✅
# - Wave 8: 100+ packages (expanded hunt) ← THIS
# - Wave 9: 500+ packages (large-scale hunt)
# - Wave 10: 1000+ packages (production-scale)

[campaign]
name = "Wave 8 - Expanded Real-World Hunt"
description = "Scale up to 100+ packages across high-risk categories with full LLM analysis"
created_by = "security-team"
priority = "high"
tags = ["hunt", "real-world", "wave8", "expanded", "production"]

[settings]
concurrency = 20
rate_limit_npm = 10.0
rate_limit_github = 5.0
cache_enabled = true
cache_ttl_days = 7

[settings.whitelist]
# Known false positives - i18n libraries naturally contain Unicode
packages = [
    "moment",
    "moment-timezone",
    "date-fns",
    "dayjs",
    "i18next",
    "react-intl",
    "lodash",
    "underscore",
    "express",
    "globalize",
    "prettier",
    "typescript",
    "eslint",
    "@babel/core",
    "@babel/*",
]

# Crypto libraries (blockchain API calls are legitimate)
crypto_packages = [
    "ethers",
    "web3",
    "viem",
    "wagmi",
    "@solana/web3.js",
    "bitcoinjs-lib",
    "hdkey",
    "@metamask/*",
    "node-forge",
    "crypto-js",
]

# Build tools (time delays are legitimate for watch mode, debouncing)
build_tools = [
    "webpack",
    "webpack-",
    "vite",
    "rollup",
    "esbuild",
    "parcel",
    "gulp",
    "grunt",
    "core-js",
]

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 4.0

[settings.llm]
tier1_enabled = true  # Tier 1 LLM (Cerebras) for fast triage during scan
tier1_provider = "cerebras"
tier2_enabled = true  # Tier 2 LLM (NVIDIA) for deep analysis of flagged
tier2_threshold = 7.0

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave8"
report_dir = "reports/wave8"

# ============================================================
# Wave 8A: Known Malicious Baseline (Validation)
# ============================================================
# These are confirmed malicious packages - MUST be flagged
[[waves]]
id = "wave_8a"
name = "Known Malicious Baseline"
description = "Validate detection with confirmed GlassWare malicious packages"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    # GlassWorm research confirmed malicious
    # Additional confirmed malicious
    "react-native-phone-input@1.3.7",
    "react-native-otp-inputs@0.3.1",
]

[waves.expectations]
must_flag_all = true
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = false

# ============================================================
# Wave 8B: Clean Baseline (False Positive Validation)
# ============================================================
# Popular safe packages - should NOT be flagged
[[waves]]
id = "wave_8b"
name = "Clean Baseline - Popular Packages"
description = "Validate low false positive rate with known clean popular packages"
depends_on = ["wave_8a"]
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    # Top npm packages (should be clean)
    "express@4.19.2",
    "lodash@4.17.21",
    "axios@1.6.7",
    "chalk@5.3.0",
    "debug@4.3.4",
    "react@18.2.0",
    "uuid@9.0.0",
    "async@3.2.5",
    "commander@11.1.0",
    "dotenv@16.3.1",
]

[waves.expectations]
must_flag_all = false
max_threat_score = 3.0

[waves.reporting]
include_clean_summary = true

