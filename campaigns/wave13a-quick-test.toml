# Wave 13A: Quick Validation Test
#
# Purpose: Quick validation on evidence + small clean baseline
# Target: 10 packages total - 2 malicious, 8 clean
#
# Run with: glassware campaign run campaigns/wave13a-quick-test.toml --llm
# Expected duration: ~5 seconds

[campaign]
name = "Wave 13A - Quick Validation"
description = "Quick validation: 2 malicious + 8 clean packages"
created_by = "security-team"
priority = "critical"
tags = ["validation", "quick", "wave13a"]

[settings]
concurrency = 10
rate_limit_npm = 10.0
rate_limit_github = 5.0
cache_enabled = true
cache_ttl_days = 7

[settings.whitelist]
packages = []
crypto_packages = []
build_tools = []

[settings.scoring]
malicious_threshold = 7.0
suspicious_threshold = 4.0

[settings.llm]
tier1_enabled = true
tier1_provider = "cerebras"
tier1_threshold = 5.0
tier2_enabled = true
tier2_threshold = 7.0

[settings.output]
formats = ["json", "markdown"]
evidence_collection = true
evidence_dir = "evidence/wave13a"
report_dir = "reports/wave13a"

# ============================================================
# Wave 13A-1: Evidence Validation (MUST detect)
# ============================================================
[[waves]]
id = "wave_13a_1"
name = "Evidence Validation"
description = "Validate detection on known malicious packages"
depends_on = []
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    # Real GlassWorm attacks (SHOULD detect)
    "react-native-country-select@0.3.91",
    "iflow-mcp-watercrawl-watercrawl-mcp@1.3.4",
]

[waves.expectations]
must_flag_all = true
min_threat_score = 7.0

[waves.reporting]
include_clean_summary = false

# ============================================================
# Wave 13A-2: Clean Baseline (MUST NOT detect)
# ============================================================
[[waves]]
id = "wave_13a_2"
name = "Clean Baseline"
description = "Validate no FPs on popular clean packages"
depends_on = ["wave_13a_1"]
mode = "validate"

[[waves.sources]]
type = "packages"
list = [
    # Popular packages (should NOT flag)
    "express@4.19.2",
    "lodash@4.17.21",
    "axios@1.6.7",
    "chalk@5.3.0",
    "debug@4.3.4",
    "react@18.2.0",
    "uuid@9.0.0",
    "typescript@5.3.3",
]

[waves.expectations]
must_flag_all = false
max_threat_score = 3.0

[waves.reporting]
include_clean_summary = true
